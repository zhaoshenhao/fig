# LLM 供应商配置（聊天）
# type: openai     → /v1/chat/completions, Authorization: Bearer
# type: anthropic  → /v1/messages, x-api-key 头
# api_key 支持 ${ENV_VAR} 环境变量占位符

default: deepseek

providers:
  ollama:
    type: openai
    base_url: ${OLLAMA_BASE_URL:-https://kaiwu.hix.ink/api/ollama/v1}
    api_key: ""
    model: ${OLLAMA_MODEL:-qwen3:4b}

  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o

  deepseek:
    type: openai
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    model: deepseek-v4-flash

  anthropic:
    type: anthropic
    base_url: https://api.anthropic.com/v1
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-20250514

  qwen:
    type: openai
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ${QWEN_API_KEY}
    model: qwen-plus

  lmstudio:
    type: openai
    base_url: http://localhost:1234/v1
    api_key: ""
    model: local-model
