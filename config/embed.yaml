# Embedding 供应商配置
# 全部使用 OpenAI 兼容格式 (/v1/embeddings)
# api_key 支持 ${ENV_VAR} 环境变量占位符

default: ollama

providers:
  # kf-embed 微服务（FastEmbed / nomic-embed-text，OpenAI 兼容 /v1/embeddings）
  ollama:
    type: openai
    base_url: ${EMBED_BASE_URL:-http://localhost:8100/v1}
    api_key: ${EMBED_API_KEY:-}
    model: ${EMBED_MODEL:-nomic-embed-text}
    dims: 768

  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    model: text-embedding-3-small
    dims: 1536
