apiVersion: apps/v1
kind: Deployment
metadata:
  name: kf-embed
  namespace: <NAMESPACE>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kf-embed
  template:
    metadata:
      labels:
        app: kf-embed
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: kf-embed
          # 模型通过 NAS PVC 挂载（INT8 量化版，构建期镜像内也有备份）
          image: <ACR_REGISTRY>/kf-embed:<EMBED_IMAGE_TAG>
          ports:
            - containerPort: 8100
          env:
            - name: EMBED_MODEL
              value: "nomic-ai/nomic-embed-text-v1.5-Q"
            - name: FASTEMBED_CACHE_PATH
              value: "/app/model"
            - name: EMBED_CACHE_DIR
              value: "/app/model"
            - name: EMBED_WARMUP
              value: "1"
            # 限制 ONNX 线程数，控制内存
            - name: OMP_NUM_THREADS
              value: "2"
            - name: OMP_WAIT_POLICY
              value: "PASSIVE"
            # 内部服务鉴权 Key（与 kf-api 共享，从 Secret 注入）
            - name: EMBED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kf-secrets
                  key: EMBED_API_KEY
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: model-storage
              mountPath: /app/model
              subPath: kf/model
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: <NAS_PVC_NAME>
