# ============================================================================
# K8s Secret Template — kf-secrets
# ============================================================================
# ⚠️ 此文件仅作结构参考，**不应包含真实密钥值**。
# 所有占位符 `<///>` 在实际部署时由以下方式填入：
#
#   方式 1 — 脚本（推荐）
#     cp /env/example /env && vim /env    # 填入真实值
#     NAMESPACE=mb-test //scripts/create-k8s-secrets/sh /env
#
#   方式 2 — kubectl 直接创建
#     kubectl create secret generic kf-secrets -n mb-test \
#       --from-literal=DEEPSEEK_API_KEY=sk-xxx \
#       --from-literal=KF_API_KEY=kf-key-xxx \
#       ///
#
#   方式 3 — Jenkins CI/CD
#     Jenkins 凭据管理存储真实值 → withCredentials 注入 → 脚本自动 apply
#     credentialsId: kf-deepseek-api-key, kf-api-key, kf-embed-api-key, ///
#
#   方式 4 — 阿里云 KMS（未来）
#     ACK 集群安装 ack-kms-secret 组件 → ExternalSecret CRD → 自动同步 KMS 凭据
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: kf-secrets
  namespace: <NAMESPACE>
  labels:
    app: kf
type: Opaque
stringData:
  # ── LLM 供应商密钥 ──
  DEEPSEEK_API_KEY: "<DEEPSEEK_API_KEY>"

  # ── API 网关鉴权 Key ──
  KF_API_KEY: "<KF_API_KEY>"

  # ── kf-api ↔ kf-embed 内部鉴权 ──
  EMBED_API_KEY: "<EMBED_API_KEY>"

  # ── Redis 会话共享 ──
  REDIS_URL: "redis://<REDIS_HOST>:6379/0"

  # ── MySQL RDS（主库 / metrics）──
  MYSQL_HOST: "<MYSQL_HOST>"
  MYSQL_PORT: "3306"
  MYSQL_USER: "<MYSQL_USER>"
  MYSQL_PASSWORD: "<MYSQL_PASSWORD>"
  MYSQL_DB: "kf_metrics"
  KF_METRICS_DB_TYPE: "mysql"
  KF_METRICS_DB_HOST: "<MYSQL_HOST>"
  KF_METRICS_DB_PORT: "3306"
  KF_METRICS_DB_USER: "<MYSQL_USER>"
  KF_METRICS_DB_PASSWORD: "<MYSQL_PASSWORD>"
  KF_METRICS_DB_NAME: "kf_metrics"

  # ── PostgreSQL RDS（分析库）──
  PG_HOST: "<PG_HOST>"
  PG_PORT: "5432"
  PG_USER: "<PG_USER>"
  PG_PASSWORD: "<PG_PASSWORD>"
  PG_DB: "kf_analytics"

  # ── OSS 凭据 ──
  OSS_ACCESS_KEY_ID: "<OSS_ACCESS_KEY_ID>"
  OSS_ACCESS_KEY_SECRET: "<OSS_ACCESS_KEY_SECRET>"
  OSS_ENDPOINT: "oss-cn-hangzhou/aliyuncs/com"
  OSS_WORKFLOW_BUCKET: "kf-config-<ENV>"
  OSS_UI_BUCKET: "kf-ui-<ENV>"
