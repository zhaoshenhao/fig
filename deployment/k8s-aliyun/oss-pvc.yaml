# ============================================================================
# OSS Persistent Volume Claims — workflow + webui
# ============================================================================
# Deployed by Jenkins (deployService) with <NAMESPACE> sed replacement.
# Each PVC binds to the pre-created PV named oss-workflow-<NAMESPACE>
# or oss-webui-<NAMESPACE> via explicit volumeName.
# ============================================================================

---
# ── Workflow OSS PVC ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oss-workflow
  namespace: <NAMESPACE>
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: oss-workflow-<NAMESPACE>
---
# ── WebUI OSS PVC ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oss-webui
  namespace: <NAMESPACE>
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: oss-webui-<NAMESPACE>
