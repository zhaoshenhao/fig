# ============================================================================
# OSS Persistent Volume Claims — workflow
# ============================================================================
# Deployed by Jenkins (deployService) with <NAMESPACE> sed replacement.
# Each PVC binds to the pre-created PV named oss-workflow-<NAMESPACE>
# via explicit volumeName.
# ============================================================================

---
# ── Workflow OSS PVC ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oss-workflow
  namespace: <NAMESPACE>
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: oss-workflow-<NAMESPACE>
---

