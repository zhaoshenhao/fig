apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kf-qdrant
  namespace: <NAMESPACE>
spec:
  serviceName: kf-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: kf-qdrant
  template:
    metadata:
      labels:
        app: kf-qdrant
    spec:
      containers:
        - name: kf-qdrant
          image: qdrant/qdrant:v1.12.6
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: kf-qdrant-storage
              mountPath: /qdrant/storage
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: kf-qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: alicloud-disk-essd
        resources:
          requests:
            storage: <QDRANT_STORAGE_SIZE>
