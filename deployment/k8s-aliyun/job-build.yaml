apiVersion: batch/v1
kind: Job
metadata:
  name: build-docs
  namespace: <NAMESPACE>
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
        - name: builder
          image: <ACR_REGISTRY>/kf-api:<API_IMAGE_TAG>
          command: ["python", "-m", "src.ingestion.builder"]
          env:
            - name: QDRANT_HOST
              value: "qdrant.<NAMESPACE>.svc.cluster.local"
            - name: QDRANT_PORT
              value: "6334"
            - name: EMBED_BASE_URL
              value: "http://kf-embed.<NAMESPACE>.svc.cluster.local:8100/v1"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
          envFrom:
            - secretRef:
                name: kf-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      restartPolicy: Never
