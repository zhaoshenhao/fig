apiVersion: apps/v1
kind: Deployment
metadata:
  name: kf-api
  namespace: <NAMESPACE>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kf-api
  template:
    metadata:
      labels:
        app: kf-api
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: kf-api
          image: <ACR_REGISTRY>/kf-api:<API_IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: KF_MODE
              value: "full"
            - name: QDRANT_HOST
              value: "kf-qdrant.<NAMESPACE>.svc.cluster.local"
            - name: QDRANT_PORT
              value: "6334"
            - name: EMBED_BASE_URL
              value: "http://kf-embed.<NAMESPACE>.svc.cluster.local:8100/v1"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
            - name: LOG_LEVEL
              value: "INFO"
            - name: CONFIG_PATH
              value: "/app/config"
            - name: KF_METRICS_ENGINE
              value: "mysql"
            - name: OSS_PATH_PREFIX
              valueFrom:
                secretKeyRef:
                  name: kf-secrets
                  key: OSS_PATH_PREFIX
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: kf-secrets
                  key: REDIS_URL
          envFrom:
            - secretRef:
                name: kf-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: workflow-config
              mountPath: /app/config/workflows
            - name: webui
              mountPath: /app/static
            - name: documents-storage
              mountPath: /app/data/documents
              subPath: kf/docs
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: workflow-config
          persistentVolumeClaim:
            claimName: <OSS_WORKFLOW_PVC>
        - name: webui
          persistentVolumeClaim:
            claimName: <OSS_WEBUI_PVC>
        - name: documents-storage
          persistentVolumeClaim:
            claimName: <NAS_PVC_DOCS>
