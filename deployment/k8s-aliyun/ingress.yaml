apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kf-ingress
  namespace: <NAMESPACE>
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/preserve-host: "false"
spec:
  ingressClassName: kong-ext
  rules:
    - host: <DOMAIN>
      http:
        paths:
          # ── SPA (static files served from OSS via Kong proxy) ──
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oss-webui
                port:
                  number: 443
          # ── Chat & Admin API (unified) ──
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /export/
            pathType: Prefix
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /collections
            pathType: Prefix
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /documents
            pathType: Prefix
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /reload
            pathType: Exact
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
          - path: /status
            pathType: Exact
            backend:
              service:
                name: kf-api
                port:
                  number: 8000
