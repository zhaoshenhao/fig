version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: kf-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_HOST: "0.0.0.0"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: kf-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c '
      echo "pulling nomic-embed-text..."
      ollama pull nomic-embed-text --host http://ollama:11434
      echo "pull complete"
      '
    volumes:
      - ollama_models:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kf-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kf-api
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_GRPC_PORT: 6334
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - kf_data:/app/data
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: kf-streamlit
    ports:
      - "8501:8501"
    environment:
      KF_API_URL: http://api:8000
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_GRPC_PORT: 6334
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_models:
  qdrant_data:
  kf_data:
