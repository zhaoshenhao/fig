version: "3.8"

services:
  embed:
    build:
      context: .
      dockerfile: Dockerfile.embed
    container_name: kf-embed
    ports:
      - "8100:8100"
    environment:
      EMBED_MODEL: "nomic-ai/nomic-embed-text-v1.5"
      EMBED_WARMUP: "1"
      EMBED_API_KEY: "${EMBED_API_KEY:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/ready').status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kf-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kf-api
    ports:
      - "8000:8000"
    environment:
      EMBED_BASE_URL: http://embed:8100/v1
      EMBED_MODEL: nomic-embed-text
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
      embed:
        condition: service_healthy
    volumes:
      - kf_data:/app/data
    restart: unless-stopped

volumes:
  qdrant_data:
  kf_data:
