apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: <NAMESPACE>
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: <ACR_REGISTRY>/kf-api:<API_IMAGE_TAG>
          ports:
            - containerPort: 8000
          env:
            - name: QDRANT_HOST
              value: "qdrant.<NAMESPACE>.svc.cluster.local"
            - name: QDRANT_PORT
              value: "6334"
            - name: OLLAMA_HOST
              value: "http://ollama.<NAMESPACE>.svc.cluster.local:11434/v1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: CONFIG_PATH
              value: "/app/config"
          volumeMounts:
            - name: config
              mountPath: /app/config/llm.yaml
              subPath: llm.yaml
            - name: config
              mountPath: /app/config/embed.yaml
              subPath: embed.yaml
            - name: config
              mountPath: /app/config/session.yaml
              subPath: session.yaml
            - name: config
              mountPath: /app/config/logging.yaml
              subPath: logging.yaml
            - name: config
              mountPath: /app/config/db.yaml
              subPath: db.yaml
            - name: workflows
              mountPath: /app/config/workflows/workflow.yaml
              subPath: workflows.yaml
            - name: workflows
              mountPath: /app/config/workflows/nodes.yaml
              subPath: nodes.yaml
            - name: auth
              mountPath: /app/config/auth.yaml
              subPath: auth.yaml
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: kf-config
        - name: workflows
          configMap:
            name: workflow-config
        - name: auth
          secret:
            secretName: auth-secret
