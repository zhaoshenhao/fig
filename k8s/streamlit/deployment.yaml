apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: <NAMESPACE>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: <ACR_REGISTRY>/kf-streamlit:<STREAMLIT_IMAGE_TAG>
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: "http://api.<NAMESPACE>.svc.cluster.local:8000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
